<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BLOCKBEATS</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6a00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BlockBeats">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

:root {
  --dirt:    #3d2b1a;
  --stone:   #1a1a1a;
  --cobble:  #252525;
  --cobble2: #2e2e2e;
  --ore:     #ff6a00;
  --ore2:    #ff9500;
  --ore3:    #ffb347;
  --lava:    #ff4500;
  --text:    #ffe0b0;
  --muted:   #a08060;
  --shadow:  #1a0e00;
  --danger:  #ff4444;
  --success: #44cc44;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'VT323',monospace;
  background:var(--stone);
  color:var(--text);
  height:100dvh;
  max-width:480px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* pixel grid overlay */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 15px,rgba(0,0,0,0.06) 15px,rgba(0,0,0,0.06) 16px),
    repeating-linear-gradient(90deg,transparent,transparent 15px,rgba(0,0,0,0.04) 15px,rgba(0,0,0,0.04) 16px);
  pointer-events:none; z-index:0;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--stone); }
::-webkit-scrollbar-thumb { background:var(--ore); }

/* ── HEADER ── */
.header {
  position:relative; z-index:10;
  background:var(--dirt);
  border-bottom:3px solid var(--ore);
  box-shadow:0 3px 0 rgba(0,0,0,0.8),0 4px 12px rgba(255,106,0,0.15);
  padding:11px 14px 10px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.logo {
  font-family:'Press Start 2P',monospace;
  font-size:0.78rem;
  color:var(--ore2);
  text-shadow:2px 2px 0 var(--shadow),-1px -1px 0 rgba(255,180,0,0.15);
  display:flex; align-items:center; gap:8px;
}
.logo-icon { font-size:1.1rem; animation:logoSpin 8s linear infinite; display:inline-block; }
@keyframes logoSpin { 0%,100%{transform:rotateY(0)} 50%{transform:rotateY(180deg)} }
.logo span { color:var(--ore3); }
.header-btns { display:flex; gap:6px; }

/* ── PIXEL BUTTONS ── */
.pxbtn {
  font-family:'Press Start 2P',monospace;
  font-size:0.42rem;
  color:var(--text);
  background:var(--cobble2);
  border:2px solid var(--ore);
  border-bottom:4px solid var(--shadow);
  border-right:4px solid var(--shadow);
  padding:7px 9px;
  cursor:pointer;
  transition:all 0.07s;
  letter-spacing:0.03em;
  white-space:nowrap;
  user-select:none;
}
.pxbtn:active { border-bottom-width:2px; border-right-width:2px; transform:translate(2px,2px); }
.pxbtn.orange { background:var(--ore); color:var(--shadow); border-color:var(--ore3); font-weight:bold; }
.pxbtn.orange:active { background:var(--ore2); }
.pxbtn.danger { background:var(--danger); color:#fff; border-color:#ff8888; }
.pxbtn.danger:active { background:#cc0000; }

/* ── TABS ── */
.tabs {
  display:flex;
  background:var(--dirt);
  border-bottom:3px solid var(--ore);
  flex-shrink:0; position:relative; z-index:10;
}
.tab {
  flex:1; text-align:center;
  font-family:'Press Start 2P',monospace; font-size:0.38rem;
  padding:9px 2px 7px;
  color:var(--muted); cursor:pointer;
  border-right:2px solid rgba(255,106,0,0.12);
  transition:all 0.12s; letter-spacing:0.02em;
  user-select:none;
}
.tab:last-child { border-right:none; }
.tab.active { color:var(--ore2); background:rgba(255,106,0,0.1); border-bottom:3px solid var(--ore2); margin-bottom:-3px; }
.tab-icon { font-size:1rem; display:block; margin-bottom:3px; }

/* ── CONTENT ── */
.content {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  position:relative; z-index:1;
  padding-bottom:8px;
  min-height:0;
}
.view { display:none; min-height:100%; }
.view.active { display:block; }

/* ── SECTION LABEL ── */
.section-label {
  font-family:'Press Start 2P',monospace; font-size:0.44rem;
  color:var(--ore); letter-spacing:0.07em;
  padding:10px 14px 6px;
  border-bottom:1px solid rgba(255,106,0,0.2); margin-bottom:4px;
  display:flex; align-items:center; justify-content:space-between;
}
.section-count {
  font-size:0.75rem; color:var(--muted);
  font-family:'VT323',monospace; letter-spacing:0;
}

/* ── SEARCH BAR ── */
.search-wrap {
  padding:10px 14px 6px;
  position:relative;
}
.search-input {
  width:100%; padding:8px 12px 8px 32px;
  background:var(--cobble2);
  border:2px solid rgba(255,106,0,0.35);
  border-bottom:3px solid var(--shadow);
  color:var(--text);
  font-family:'VT323',monospace; font-size:1.1rem;
  outline:none; letter-spacing:0.05em;
  transition:border-color 0.15s;
}
.search-input:focus { border-color:var(--ore); }
.search-input::placeholder { color:var(--muted); }
.search-icon {
  position:absolute; left:22px; top:50%; transform:translateY(-50%);
  font-size:0.85rem; pointer-events:none;
}

/* ── SORT BAR ── */
.sort-bar {
  display:flex; gap:6px; padding:0 14px 8px; align-items:center;
  font-family:'Press Start 2P',monospace; font-size:0.32rem;
}
.sort-label { color:var(--muted); margin-right:2px; }
.sort-btn {
  background:var(--cobble2); border:1px solid rgba(255,106,0,0.3);
  color:var(--muted); padding:4px 7px; cursor:pointer; font-family:inherit; font-size:inherit;
  transition:all 0.1s;
}
.sort-btn.active { color:var(--ore2); border-color:var(--ore); background:rgba(255,106,0,0.08); }

/* ── UPLOAD ZONE ── */
.upload-zone {
  margin:12px 14px; padding:20px 16px; text-align:center; cursor:pointer;
  background:var(--cobble);
  border:3px dashed var(--ore);
  transition:all 0.15s;
  position:relative; overflow:hidden;
}
.upload-zone::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,106,0,0.03) 0%,transparent 60%);
  pointer-events:none;
}
.upload-zone.drag-over {
  border-style:solid; border-color:var(--ore3);
  background:rgba(255,106,0,0.07);
  transform:scale(1.01);
}
.upload-zone input { display:none; }
.upload-pixelicon { font-size:2rem; margin-bottom:6px; }
.upload-title { font-family:'Press Start 2P',monospace; font-size:0.5rem; color:var(--ore2); margin-bottom:4px; }
.upload-sub { font-size:0.95rem; color:var(--muted); }
.upload-progress {
  margin-top:10px; height:6px;
  background:var(--cobble2); border:1px solid rgba(255,106,0,0.3);
  display:none;
}
.upload-progress-fill { height:100%; background:var(--ore); width:0%; transition:width 0.2s; }

/* ── TRACK ITEM ── */
.track-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px 9px 14px; cursor:pointer;
  border-bottom:1px solid rgba(255,106,0,0.08);
  transition:background 0.1s; position:relative;
}
.track-item:active { background:rgba(255,106,0,0.07); }
.track-item.playing {
  background:rgba(255,106,0,0.1);
  border-left:4px solid var(--ore2);
  padding-left:10px;
}
.track-num {
  font-size:0.75rem; color:var(--muted);
  width:18px; text-align:right; flex-shrink:0;
}

.track-block {
  width:42px; height:42px; flex-shrink:0;
  background:var(--cobble2);
  border:2px solid var(--ore);
  border-bottom:4px solid var(--shadow);
  border-right:4px solid var(--shadow);
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem;
  transition:box-shadow 0.2s;
}
.track-block.pulsing { animation:blockPulse 0.6s ease infinite alternate; }
@keyframes blockPulse {
  from { border-color:var(--ore); }
  to   { border-color:var(--ore3); box-shadow:0 0 10px rgba(255,106,0,0.6); }
}

.track-details { flex:1; overflow:hidden; }
.track-name {
  font-family:'Press Start 2P',monospace; font-size:0.42rem; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:4px; line-height:1.5;
}
.track-item.playing .track-name { color:var(--ore2); }
.track-artist { font-size:0.88rem; color:var(--muted); }
.track-dur { font-size:0.82rem; color:var(--muted); flex-shrink:0; }
.track-more {
  background:none; border:none; color:rgba(255,106,0,0.5);
  font-size:1.35rem; cursor:pointer; padding:4px 2px 4px 6px; line-height:1;
  transition:color 0.1s;
}
.track-more:hover, .track-more:active { color:var(--ore); }

/* ── EQ BARS ── */
.bars { display:flex; align-items:flex-end; gap:2px; height:14px; }
.bar { width:3px; background:var(--ore2); animation:barUp 0.55s ease infinite alternate; }
.bar:nth-child(2){animation-delay:.18s;background:var(--ore3);}
.bar:nth-child(3){animation-delay:.36s;}
@keyframes barUp { from{height:2px} to{height:12px} }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:48px 20px; }
.empty-icon { font-size:2.6rem; margin-bottom:10px; }
.empty-title { font-family:'Press Start 2P',monospace; font-size:0.52rem; color:var(--ore); margin-bottom:8px; }
.empty-sub { font-size:1rem; color:var(--muted); line-height:1.5; }

/* ── PLAYLIST GRID ── */
.playlist-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 14px; }
.playlist-card {
  background:var(--cobble2);
  border:2px solid var(--ore);
  border-bottom:5px solid var(--shadow);
  border-right:5px solid var(--shadow);
  padding:12px 10px; cursor:pointer;
  transition:all 0.08s; position:relative; overflow:hidden;
}
.playlist-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--ore),transparent);
  opacity:0.4;
}
.playlist-card:active { transform:translate(2px,2px); border-bottom-width:2px; border-right-width:2px; }
.card-emoji { font-size:2rem; margin-bottom:7px; }
.card-name { font-family:'Press Start 2P',monospace; font-size:0.38rem; color:var(--ore2); margin-bottom:5px; line-height:1.7; }
.card-count { font-size:0.83rem; color:var(--muted); }
.create-card {
  background:transparent; border:3px dashed rgba(255,106,0,0.5);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px 10px; cursor:pointer; min-height:108px;
  transition:all 0.12s;
}
.create-card:hover, .create-card:active { background:rgba(255,106,0,0.05); border-color:var(--ore); }
.create-card-icon { font-size:1.7rem; margin-bottom:6px; opacity:0.7; }
.create-card-text { font-family:'Press Start 2P',monospace; font-size:0.36rem; color:var(--ore); text-align:center; line-height:1.9; opacity:0.8; }

/* ── PLAYLIST DETAIL ── */
.pl-hero {
  background:linear-gradient(180deg,rgba(61,43,26,1) 0%,rgba(42,30,18,1) 100%);
  border-bottom:3px solid var(--ore);
  padding:14px 14px; display:flex; gap:14px; align-items:center;
  position:relative; overflow:hidden;
}
.pl-hero::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,106,0,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.pl-cover {
  width:70px; height:70px;
  border:3px solid var(--ore);
  border-bottom:5px solid var(--shadow); border-right:5px solid var(--shadow);
  display:flex; align-items:center; justify-content:center;
  font-size:2.3rem; flex-shrink:0; background:var(--cobble);
  animation:coverGlow 3s ease infinite alternate;
}
@keyframes coverGlow {
  from { box-shadow:none; }
  to   { box-shadow:0 0 12px rgba(255,106,0,0.4); }
}
.pl-name { font-family:'Press Start 2P',monospace; font-size:0.58rem; color:var(--ore2); margin-bottom:4px; line-height:1.5; }
.pl-meta { font-size:0.9rem; color:var(--muted); margin-bottom:10px; }
.pl-actions { display:flex; gap:6px; flex-wrap:wrap; }
.back-btn {
  font-family:'Press Start 2P',monospace; font-size:0.4rem;
  color:var(--ore); background:none; border:none; cursor:pointer;
  padding:10px 14px 6px; display:flex; align-items:center; gap:5px;
  transition:color 0.1s;
}
.back-btn:hover { color:var(--ore2); }
.add-section { padding:0 14px 14px; }
.add-section-title { font-family:'Press Start 2P',monospace; font-size:0.4rem; color:var(--muted); margin-bottom:8px; padding-top:10px; }
.add-track-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,106,0,0.08); }
.add-btn {
  font-family:'Press Start 2P',monospace; font-size:0.36rem;
  background:var(--cobble2); border:2px solid var(--ore);
  border-bottom:3px solid var(--shadow); border-right:3px solid var(--shadow);
  color:var(--ore2); padding:5px 7px; cursor:pointer; white-space:nowrap; flex-shrink:0;
}
.add-btn:active { transform:translate(1px,1px); border-bottom-width:1px; border-right-width:1px; }
.add-btn.added { color:var(--muted); border-color:rgba(255,106,0,0.2); cursor:default; }

/* ── PLAYER BAR ── */
.player-bar {
  background:linear-gradient(180deg,#2a1a08 0%,#1a0e00 100%);
  border-top:3px solid var(--ore);
  box-shadow:0 -4px 0 rgba(0,0,0,0.8), 0 -8px 28px rgba(255,106,0,0.12);
  padding:10px 14px 16px; flex-shrink:0;
  position:relative; z-index:10;
}
.player-bar::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--ore2),transparent);
  opacity:0.4;
}
.player-now { display:flex; align-items:center; gap:11px; margin-bottom:10px; }
.player-art {
  width:46px; height:46px;
  border:2px solid var(--ore); border-bottom:4px solid var(--shadow); border-right:4px solid var(--shadow);
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; flex-shrink:0; background:var(--cobble);
  cursor:pointer; transition:transform 0.1s;
}
.player-art:active { transform:scale(0.93); }
.player-info { flex:1; overflow:hidden; }
.player-title {
  font-family:'Press Start 2P',monospace; font-size:0.43rem; color:var(--ore2);
  overflow:hidden; margin-bottom:4px;
  white-space:nowrap;
}
/* scrolling marquee for long titles */
.player-title.scrolling { animation:marquee 8s linear infinite; }
@keyframes marquee {
  0%   { transform:translateX(0); }
  30%  { transform:translateX(0); }
  70%  { transform:translateX(var(--scroll-dist,0px)); }
  100% { transform:translateX(var(--scroll-dist,0px)); }
}
.player-artist { font-size:0.84rem; color:var(--muted); }

.progress-wrap { margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.time { font-size:0.86rem; color:var(--muted); flex-shrink:0; font-variant-numeric:tabular-nums; min-width:2.8ch; }
.progress-track {
  flex:1; height:10px; background:var(--cobble);
  border:2px solid rgba(255,106,0,0.3); cursor:pointer;
  position:relative; border-radius:1px;
}
.progress-fill { height:100%; background:linear-gradient(90deg,var(--ore),var(--ore2)); pointer-events:none; transition:width 0.1s linear; }

.controls { display:flex; align-items:center; justify-content:center; gap:10px; }
.ctrl {
  background:var(--cobble2); border:2px solid rgba(255,106,0,0.35);
  border-bottom:3px solid var(--shadow); border-right:3px solid var(--shadow);
  color:var(--muted); font-size:1.05rem;
  width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.1s; user-select:none;
}
.ctrl:active { transform:translate(1px,1px); border-bottom-width:1px; border-right-width:1px; }
.ctrl.active { color:var(--ore2); border-color:var(--ore); background:rgba(255,106,0,0.1); }
.ctrl-play {
  width:56px; height:56px;
  background:linear-gradient(135deg,var(--ore),var(--lava));
  border:3px solid var(--ore3);
  border-bottom:5px solid var(--shadow); border-right:5px solid var(--shadow);
  color:var(--shadow); font-size:1.5rem;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  user-select:none; transition:all 0.07s;
}
.ctrl-play:active { transform:translate(2px,2px); border-bottom-width:2px; border-right-width:2px; }

@keyframes lavaGlow {
  0%,100%{ box-shadow:0 0 6px var(--ore); }
  50%    { box-shadow:0 0 22px var(--ore2), 0 0 40px rgba(255,106,0,0.3); }
}
.player-bar.playing .ctrl-play { animation:lavaGlow 1.5s ease infinite; }

.volume-wrap { display:flex; align-items:center; gap:8px; margin-top:8px; }
.vol-icon { font-size:0.82rem; color:var(--muted); cursor:pointer; user-select:none; }
.vol-track { flex:1; height:5px; background:var(--cobble); border:1px solid rgba(255,106,0,0.25); cursor:pointer; }
.vol-fill { height:100%; background:var(--muted); pointer-events:none; transition:width 0.1s; }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:500;
  display:none; align-items:center; justify-content:center; padding:16px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--cobble); border:3px solid var(--ore);
  border-bottom:6px solid var(--shadow); border-right:6px solid var(--shadow);
  padding:18px; width:100%; max-width:360px;
  animation:modalPop 0.15s ease;
}
@keyframes modalPop { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
.modal-title { font-family:'Press Start 2P',monospace; font-size:0.56rem; color:var(--ore2); margin-bottom:14px; }
.field-label { font-family:'Press Start 2P',monospace; font-size:0.38rem; color:var(--muted); margin-bottom:5px; display:block; }
.field-input {
  width:100%; padding:9px 12px; background:var(--stone);
  border:2px solid rgba(255,106,0,0.4); color:var(--text);
  font-family:'VT323',monospace; font-size:1.2rem; outline:none; margin-bottom:12px;
  transition:border-color 0.15s;
}
.field-input:focus { border-color:var(--ore2); }
.emoji-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; margin-bottom:12px; max-height:90px; overflow-y:auto; }
.em-btn {
  aspect-ratio:1; font-size:1.1rem;
  background:var(--stone); border:2px solid transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.08s;
}
.em-btn.sel { border-color:var(--ore2); background:rgba(255,106,0,0.12); transform:scale(1.1); }
.color-row { display:flex; gap:7px; margin-bottom:14px; flex-wrap:wrap; }
.col-btn { width:26px; height:26px; border:3px solid transparent; cursor:pointer; transition:all 0.1s; }
.col-btn.sel { border-color:white; transform:scale(1.18); }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; }

/* ── RENAME MODAL for tracks ── */
.modal-subtitle { font-size:0.85rem; color:var(--muted); margin-bottom:12px; }

/* ── SHEET ── */
.sheet-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:400;
  display:none; align-items:flex-end;
}
.sheet-overlay.open { display:flex; }
.sheet {
  background:var(--cobble); border-top:3px solid var(--ore);
  border-left:3px solid rgba(255,106,0,0.5); border-right:3px solid rgba(255,106,0,0.5);
  width:100%; padding:14px 14px 32px;
  animation:sheetUp 0.18s ease;
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width:36px; height:4px; background:rgba(255,106,0,0.3); margin:0 auto 12px; border-radius:2px; }
.sheet-title { font-family:'Press Start 2P',monospace; font-size:0.46rem; color:var(--ore); margin-bottom:10px; }
.sheet-track-info { display:flex; gap:10px; align-items:center; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid rgba(255,106,0,0.2); }
.sheet-item {
  display:flex; align-items:center; gap:12px; padding:11px 8px; cursor:pointer;
  font-family:'Press Start 2P',monospace; font-size:0.4rem;
  border-bottom:1px solid rgba(255,106,0,0.08); color:var(--text);

/* ── TOAST ── */
.toast {
  position:fixed; bottom:180px; left:50%; transform:translateX(-50%) translateY(8px);

}

.toast.error { color:var(--danger); border-color:var(--danger); }
.toast.success { color:var(--success); border-color:var(--success); }

/* ── NOW PLAYING INDICATOR on home ── */
.now-playing-banner {

/* ── STATS STRIP on home ── */

}

  flex:1; text-align:center;

/* ── KEYBOARD SHORTCUT hint ── */

<audio id="aud"></audio>

<script>
/* ══════════════════════════════════════════════════════
   ÉTAT GLOBAL
══════════════════════════════════════════════════════ */
let tracks=[], playlists=[], queue=[], qIdx=-1, playing=false, shuffle=false, repeat=false;
let selEmoji='🎵', selColor='#ff6a00', sheetTid=null, sheetPid=null, curTab='home';
let sortMode='date'; // 'title' | 'artist' | 'date'
let volBeforeMute=0.8, isMuted=false;
let renameTid=null;
let saveStatePending=false;
let db=null;

const aud=document.getElementById('aud');

const EMOJIS=['🎵','🎶','⚔️','🔥','💎','🪨','🌲','🐉','🏰','⚡','🌙','🎸','🥁','🎤','🎹','🎺','💀','🍊','🐷','🐮','👾','🏆','🌊','🗡️','🎯','🎲','🔮','🍕','🌈','🦊'];
const COLORS=['#ff6a00','#ff9500','#e83535','#2196f3','#4caf50','#9c27b0','#795548','#607d8b','#00bcd4','#e91e63'];

/* ══════════════════════════════════════════════════════
   INDEXEDDB
══════════════════════════════════════════════════════ */
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open('blockbeats',1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks',{keyPath:'id'});
      if(!d.objectStoreNames.contains('audio'))  d.createObjectStore('audio', {keyPath:'id'});
      if(!d.objectStoreNames.contains('meta'))   d.createObjectStore('meta',  {keyPath:'key'});
    };
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function dbGet(store,key){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).get(key);
    req.onsuccess=e=>resolve(e.target.result??null);
    req.onerror=e=>reject(e.target.error);
  });
}
function dbGetAll(store){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function dbPut(store,value){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).put(value);
    req.onsuccess=()=>resolve();
    req.onerror=e=>reject(e.target.error);
  });
}
function dbDelete(store,key){
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).delete(key);
    req.onsuccess=()=>resolve();
    req.onerror=e=>reject(e.target.error);
  });
}

/* ── PERSISTANCE ── */
async function saveP(){
  await dbPut('meta',{key:'playlists',value:playlists}).catch(()=>{});
}
async function saveState(){
  try{
    const t=queue[qIdx];
    await dbPut('meta',{key:'state',value:{
      trackId:  t?t.id:null,
      queueIds: queue.map(x=>x.id),
      position: (aud.currentTime&&aud.duration&&!isNaN(aud.currentTime))?aud.currentTime:0,
      volume:   aud.volume, shuffle, repeat
    }}).catch(()=>{});
  }catch(e){}
}
async function loadFromDB(){
  const [metas,audioRows]=await Promise.all([dbGetAll('tracks'),dbGetAll('audio')]);
  const audioMap={};
  for(const row of audioRows) audioMap[row.id]=row.blob;
  tracks=[];
  for(const meta of metas){
    const blob=audioMap[meta.id];
    if(!blob) continue;
    tracks.push({...meta,src:URL.createObjectURL(blob)});
  }
  const plRow=await dbGet('meta','playlists').catch(()=>null);
  playlists=plRow?plRow.value:[];
  const ids=new Set(tracks.map(t=>t.id));
  playlists.forEach(pl=>{pl.trackIds=pl.trackIds.filter(id=>ids.has(id));});
}
async function migrateFromLocalStorage(){
  const existing=await dbGetAll('tracks');
  if(existing.length>0) return;
  let lsTracks=[];
  try{lsTracks=JSON.parse(localStorage.getItem('bb_t')||'[]');}catch(e){}
  if(!lsTracks.length) return;
  showToast('MIGRATION EN COURS…');
  let ok=0;
  for(const t of lsTracks){
    if(!t.src||!t.src.startsWith('data:')) continue;
    try{
      const blob=dataURLtoBlob(t.src);
      await dbPut('tracks',{id:t.id,title:t.title,artist:t.artist,duration:t.duration,emoji:t.emoji||'🎵',addedAt:Date.now()});
      await dbPut('audio',{id:t.id,blob});
      ok++;
    }catch(e){}
  }
  const plRow=await dbGet('meta','playlists').catch(()=>null);
  if(!plRow){
    let lsPl=[];
    try{lsPl=JSON.parse(localStorage.getItem('bb_p')||'[]');}catch(e){}
    if(lsPl.length) await dbPut('meta',{key:'playlists',value:lsPl});
  }
  const stateRow=await dbGet('meta','state').catch(()=>null);
  if(!stateRow){
    try{
      const s=JSON.parse(localStorage.getItem('bb_state')||'null');
      if(s) await dbPut('meta',{key:'state',value:s});
    }catch(e){}
  }
  if(ok>0) showToast(ok+' SON'+(ok>1?'S':'')+' MIGRÉ'+(ok>1?'S':'')+' ✓','success');
  localStorage.removeItem('bb_t');
  localStorage.removeItem('bb_p');
  localStorage.removeItem('bb_state');
}
async function restoreState(){
  const row=await dbGet('meta','state').catch(()=>null);
  const s=row?row.value:null;
  if(!s) return;
  const vol=typeof s.volume==='number'?Math.max(0,Math.min(1,s.volume)):0.8;
  aud.volume=vol;
  document.getElementById('volFill').style.width=(vol*100)+'%';
  if(s.shuffle){shuffle=true;document.getElementById('btnShuffle').classList.add('active');}
  if(s.repeat) {repeat=true; document.getElementById('btnRepeat').classList.add('active');}
  if(s.trackId&&s.queueIds&&s.queueIds.length){
    const rq=s.queueIds.map(id=>tracks.find(t=>t.id===id)).filter(Boolean);
    if(!rq.length) return;
    const ri=rq.findIndex(t=>t.id===s.trackId);
    if(ri===-1) return;
    queue=rq; qIdx=ri;
    const t=queue[qIdx];
    aud.src=t.src;
    const pos=s.position||0;
    const onCan=()=>{if(pos>0&&pos<aud.duration-1)aud.currentTime=pos;aud.removeEventListener('canplay',onCan);};
    aud.addEventListener('canplay',onCan);
    setPlayerUI(t,false);
    refreshRows();
  }
}
function dataURLtoBlob(dataURL){
  const[header,data]=dataURL.split(',');
  const mime=header.match(/:(.*?);/)[1];
  const binary=atob(data);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new Blob([bytes],{type:mime});
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
async function init(){
  db=await openDB();
  await migrateFromLocalStorage();
  await loadFromDB();

  buildEmoji(document.getElementById('emojiGrid'),EMOJIS,(e)=>{selEmoji=e;});
  buildColor();

  document.getElementById('gup').addEventListener('change',e=>{handleFiles([...e.target.files]);e.target.value='';});
  document.getElementById('fileInput').addEventListener('change',e=>{handleFiles([...e.target.files]);e.target.value='';});
  const zone=document.getElementById('uploadZone');
  zone.addEventListener('click',()=>document.getElementById('fileInput').click());
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');handleFiles([...e.dataTransfer.files]);});

  aud.addEventListener('timeupdate',()=>{
    const p=aud.duration?(aud.currentTime/aud.duration)*100:0;
    document.getElementById('progFill').style.width=p+'%';
    document.getElementById('curTime').textContent=fmt(aud.currentTime);
    document.getElementById('totTime').textContent=fmt(aud.duration||0);
    if(Math.floor(aud.currentTime)%5===0&&!saveStatePending){
      saveStatePending=true;
      saveState().finally(()=>{saveStatePending=false;});
    }
  });
  aud.addEventListener('ended',()=>{
    if(repeat){aud.currentTime=0;aud.play();}else{nextTrack();}
    saveState();
  });
  aud.addEventListener('play',  () => { try{ if(navigator.mediaSession) navigator.mediaSession.playbackState='playing'; }catch(e){} });
  aud.addEventListener('pause', () => { try{ if(navigator.mediaSession) navigator.mediaSession.playbackState='paused';  }catch(e){} });
  aud.volume=0.8;

  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT') return;
    if(e.key===' '){e.preventDefault();togglePlay();}
    if(e.key==='ArrowRight'){e.preventDefault();nextTrack();}
    if(e.key==='ArrowLeft'){e.preventDefault();prevTrack();}
    if(e.key==='Escape'){closeModal();closeRename();closeSheet();}
    if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('open'))createPlaylist();
    if(e.key==='Enter'&&document.getElementById('renameOverlay').classList.contains('open'))saveRename();
    if(e.key==='m'||e.key==='M') toggleMute();
  });

  renderAll();
  await restoreState();
  window.addEventListener('pagehide',saveState);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')saveState();});

  // Hide loading screen
  document.getElementById('loadScreen').style.opacity='0';
  setTimeout(()=>document.getElementById('loadScreen').remove(),300);
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderAll(){renderHome();renderLib();renderPlaylists();}

function renderHome(){
  // Stats strip
  document.getElementById('statTracks').textContent=tracks.length;
  document.getElementById('statLists').textContent=playlists.length;
  document.getElementById('statTime').textContent=fmtTotal(tracks);

  // Now playing banner
  const banner=document.getElementById('npBanner');
  const t=queue[qIdx];
  if(t&&(playing||aud.src)){
    banner.classList.add('visible');
    document.getElementById('npArt').textContent=t.emoji;
    document.getElementById('npTitle').textContent=t.title.toUpperCase();
    document.getElementById('npArtist').textContent=t.artist;
  } else {
    banner.classList.remove('visible');
  }

  const g=document.getElementById('homeGrid'); g.innerHTML='';
  playlists.slice(0,6).forEach(pl=>{
    const c=document.createElement('div');c.className='playlist-card';c.onclick=()=>showTab('playlist-detail',pl.id);
    c.innerHTML=`<div class="card-emoji">${pl.emoji}</div><div class="card-name">${esc(pl.name)}</div><div class="card-count">${pl.trackIds.length} SON${pl.trackIds.length!==1?'S':''}</div>`;
    g.appendChild(c);
  });
  const cc=document.createElement('div');cc.className='create-card';cc.onclick=openCreatePlaylist;

function getSortedFiltered(){
  const q=(document.getElementById('libSearch')?.value||'').toLowerCase().trim();
  let list=q
    ? tracks.filter(t=>t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q))
    : [...tracks];
  if(sortMode==='title')  list.sort((a,b)=>a.title.localeCompare(b.title));
  if(sortMode==='artist') list.sort((a,b)=>a.artist.localeCompare(b.artist));
  if(sortMode==='date')   list.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  return list;
}

/* ══════════════════════════════════════════════════════
   FILE IMPORT
══════════════════════════════════════════════════════ */
function handleFiles(files){
  const EXTS = ['.mp3','.mp4','.m4a','.ogg','.wav','.webm','.aac','.flac','.opus'];
  const af = files.filter(f => {
    const name = f.name.toLowerCase();
    return f.type.startsWith('audio/') ||
           f.type === 'video/mp4' ||
           f.type.startsWith('video/') ||
           EXTS.some(ext => name.endsWith(ext));
  });
  if(!af.length){showToast('FORMAT NON SUPPORTÉ !','error');return;}
  let loaded=0;
  const bar=document.getElementById('uploadProgress');
  const fill=document.getElementById('uploadProgressFill');
  bar.style.display='block'; fill.style.width='0%';

  af.forEach(file=>{
    const id='tr_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    let title=file.name.replace(/\.[^.]+$/,''),artist='INCONNU';
    if(title.includes(' - ')){const p=title.split(' - ');artist=p[0].trim().toUpperCase();title=p.slice(1).join(' - ').trim();}
    const fr=new FileReader();
    fr.onload=ev=>{
      const mimeType = file.type || (file.name.toLowerCase().endsWith('.mp4') ? 'video/mp4' : 'audio/mpeg');
      const blob=new Blob([ev.target.result],{type: mimeType});
      const src=URL.createObjectURL(blob);
      const t={id,title,artist,duration:0,src,emoji:'🎵',addedAt:Date.now()};
      const tmp=new Audio(src);
      const done=async()=>{
        t.duration=tmp.duration||0;
        tracks.push(t);
        await dbPut('tracks',{id,title:t.title,artist:t.artist,duration:t.duration,emoji:t.emoji,addedAt:t.addedAt}).catch(()=>{});
        await dbPut('audio',{id,blob}).catch(()=>{});
        loaded++;
        fill.style.width=(loaded/af.length*100)+'%';
        if(loaded===af.length){
          renderAll();
          showToast(loaded+' SON'+(loaded>1?'S':'')+' AJOUTÉ'+(loaded>1?'S':'')+'!','success');
          setTimeout(()=>{bar.style.display='none';fill.style.width='0%';},1200);
        }
      };
      tmp.addEventListener('loadedmetadata',done);
      tmp.addEventListener('error',done);
    };
    fr.readAsArrayBuffer(file);
  });
}

function setPlayerUI(t,isPlaying){
  const title=t.title.toUpperCase();
  const titleEl=document.getElementById('playerTitle');
  titleEl.textContent=title;
  // marquee si titre trop long
  titleEl.classList.remove('scrolling');
  requestAnimationFrame(()=>{
    const overflow=titleEl.scrollWidth-titleEl.clientWidth;
    if(overflow>10){
      titleEl.style.setProperty('--scroll-dist','-'+overflow+'px');
      titleEl.classList.add('scrolling');
    }
  });
  document.getElementById('playerArtist').textContent=t.artist;
  document.getElementById('playerArt').textContent=t.emoji;
  document.getElementById('playBtn').textContent=isPlaying?'⏸':'▶';
  if(isPlaying){
    document.getElementById('playerBars').style.display='block';
    document.getElementById('playerBar').classList.add('playing');
  } else {
    document.getElementById('playerBars').style.display='none';
    document.getElementById('playerBar').classList.remove('playing');
  }
  document.title=t.title+' — BLOCKBEATS';
  // update home banner
  if(curTab==='home') renderHome();
  // Media Session (écran verrouillé)
  updateMediaSession(t);
}

function playAt(idx){
  if(!queue.length)return;
  if(shuffle)idx=Math.floor(Math.random()*queue.length);
  qIdx=idx;const t=queue[qIdx];if(!t)return;
  aud.src=t.src;aud.play().catch(()=>{});
  playing=true;
  setPlayerUI(t,true);
  refreshRows();
  saveState();
}

function togglePlay(){
  if(!aud.src||aud.src===window.location.href){if(tracks.length){queue=tracks;playAt(0);}return;}
  if(playing){
    aud.pause();playing=false;
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('playerBars').style.display='none';
    document.getElementById('playerBar').classList.remove('playing');
  } else {
    aud.play();playing=true;
    document.getElementById('playBtn').textContent='⏸';
    document.getElementById('playerBars').style.display='block';
    document.getElementById('playerBar').classList.add('playing');
  }
  refreshRows();
}

function nextTrack(){if(!queue.length)return;playAt(shuffle?Math.floor(Math.random()*queue.length):(qIdx+1)%queue.length);}
function prevTrack(){
  if(!queue.length)return;
  if(aud.currentTime>3){aud.currentTime=0;return;}
  playAt(shuffle?Math.floor(Math.random()*queue.length):(qIdx-1+queue.length)%queue.length);
}
function toggleShuffle(){shuffle=!shuffle;document.getElementById('btnShuffle').classList.toggle('active',shuffle);saveState();}
function toggleRepeat(){repeat=!repeat;document.getElementById('btnRepeat').classList.toggle('active',repeat);saveState();}

function seekTo(e){
  if(!aud.duration)return;
  const r=e.currentTarget.getBoundingClientRect();
  aud.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*aud.duration;
}
function setVol(e){
  const r=e.currentTarget.getBoundingClientRect();
  const v=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  aud.volume=v; isMuted=(v===0);
  document.getElementById('volFill').style.width=(v*100)+'%';
  document.getElementById('volIcon').textContent=v===0?'🔇':v<0.4?'🔉':'🔊';
  saveState();
}
function toggleMute(){
  if(isMuted){aud.volume=volBeforeMute;isMuted=false;}
  else{volBeforeMute=aud.volume;aud.volume=0;isMuted=true;}
  const v=aud.volume;
  document.getElementById('volFill').style.width=(v*100)+'%';
  document.getElementById('volIcon').textContent=isMuted?'🔇':'🔊';
}

function playPl(pid){
  const pl=playlists.find(p=>p.id===pid);
  if(!pl||!pl.trackIds.length){showToast('PLAYLIST VIDE !','error');return;}
  queue=pl.trackIds.map(id=>tracks.find(t=>t.id===id)).filter(Boolean);
  playAt(0);
}
function shufflePl(pid){
  const pl=playlists.find(p=>p.id===pid);
  if(!pl||!pl.trackIds.length){showToast('PLAYLIST VIDE !','error');return;}
  queue=pl.trackIds.map(id=>tracks.find(t=>t.id===id)).filter(Boolean);
  queue.sort(()=>Math.random()-0.5);
  qIdx=0;
  const t=queue[qIdx];
  aud.src=t.src;aud.play().catch(()=>{});
  playing=true;setPlayerUI(t,true);refreshRows();saveState();
  showToast('SHUFFLE ⇄','success');
}

function refreshRows(){
  document.querySelectorAll('.track-item').forEach(row=>{
    const np=queue[qIdx]?.id===row.dataset.id;
    row.classList.toggle('playing',np);
    const b=row.querySelector('.track-block');
    if(b){
      b.classList.toggle('pulsing',np&&playing);
      if(np&&playing) b.innerHTML='<div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>';
      else if(!np){const t=tracks.find(t=>t.id===row.dataset.id);if(t)b.textContent=t.emoji;}
    }
    const tn=row.querySelector('.track-name');
    if(tn) tn.style.color=np?'var(--ore2)':'';
  });
}

  if(!queue[qIdx]) return;
  showTab('library');

    const el=document.querySelector(`.track-item[data-id="${queue[qIdx].id}"]`);

function openSheetPl(tid,pid){

  document.getElementById('sheetInfo').innerHTML=`<div style="font-size:1.8rem">${t.emoji}</div><div><div style="font-family:'Press Start 2P',monospace;font-size:0.4rem;color:var(--ore2)">${esc(t.title)}</div></div>`;
  document.getElementById('sheetBody').innerHTML=`<div class="sheet-item" onclick="openRename('${tid}');closeSheet()"><span class="sheet-item-icon">✏️</span>RENOMMER</div><div class="sheet-item" onclick="rmFromPl('${tid}','${pid}');closeSheet()"><span class="sheet-item-icon">↩</span>RETIRER DE LA LISTE</div><div class="sheet-item danger" onclick="delTrack('${tid}');closeSheet()"><span class="sheet-item-icon">🗑</span>SUPPRIMER</div>`;

function closeSheet(e){

}

   RENAME TRACK
══════════════════════════════════════════════════════ */
function openRename(tid){
  const t=tracks.find(x=>x.id===tid);if(!t)return;
  renameTid=tid;
  document.getElementById('renameSubtitle').textContent='';
  document.getElementById('renameTitle').value=t.title;
  document.getElementById('renameArtist').value=t.artist;
  // build emoji picker for rename
  const grid=document.getElementById('renameEmojiGrid');
  grid.innerHTML='';
  let renameEmoji=t.emoji;
  EMOJIS.forEach(em=>{
    const b=document.createElement('button');
    b.className='em-btn'+(em===t.emoji?' sel':'');
    b.textContent=em; b.dataset.e=em;
    b.onclick=()=>{
      renameEmoji=em;
      grid.querySelectorAll('.em-btn').forEach(x=>x.classList.toggle('sel',x.dataset.e===em));
    };
    grid.appendChild(b);
  });
  document.getElementById('renameOverlay')._emoji=()=>renameEmoji;
  document.getElementById('renameOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('renameTitle').focus(),100);
}
function closeRename(){
  document.getElementById('renameOverlay').classList.remove('open');
  renameTid=null;
}
async function saveRename(){
  if(!renameTid)return;
  const t=tracks.find(x=>x.id===renameTid);if(!t)return;
  const newTitle=document.getElementById('renameTitle').value.trim();
  const newArtist=document.getElementById('renameArtist').value.trim();
  const newEmoji=document.getElementById('renameOverlay')._emoji?.()??t.emoji;
  if(!newTitle){showToast('TITRE REQUIS !','error');return;}
  t.title=newTitle;
  t.artist=newArtist||'INCONNU';
  t.emoji=newEmoji;
  await dbPut('tracks',{id:t.id,title:t.title,artist:t.artist,duration:t.duration,emoji:t.emoji,addedAt:t.addedAt}).catch(()=>{});
  // update player UI if this track is playing
  if(queue[qIdx]?.id===t.id) setPlayerUI(t,playing);
  renderAll();
  closeRename();
  showToast('PISTE MISE À JOUR ✓','success');
}

function openCreatePlaylist(){
  selEmoji='🎵'; selColor=COLORS[0];
  document.getElementById('plName').value='';
  // rebuild emoji grid with current selection
  const grid=document.getElementById('emojiGrid');
  grid.innerHTML='';
  buildEmoji(grid,EMOJIS,(e)=>{selEmoji=e;});

  document.getElementById('modalOverlay').classList.add('open');

}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function createPlaylist(){
  const name=document.getElementById('plName').value.trim();
  if(!name){showToast('DONNE UN NOM !','error');return;}
  const pl={id:'pl_'+Date.now(),name,emoji:selEmoji,color:selColor,trackIds:[]};
  playlists.push(pl);saveP();renderAll();closeModal();
  showToast('"'+name.toUpperCase()+'" CRÉÉE !','success');
  showTab('playlist-detail',pl.id);
}
function delPl(id){
  if(!confirm('Supprimer cette playlist ?'))return;
  playlists=playlists.filter(p=>p.id!==id);
  saveP();renderAll();showTab('playlists');showToast('PLAYLIST SUPPRIMÉE');
}
function addToPl(tid,pid,btn){
  const pl=playlists.find(p=>p.id===pid);if(!pl||pl.trackIds.includes(tid))return;
  pl.trackIds.push(tid);saveP();
  if(btn){btn.textContent='✓ OK';btn.classList.add('added');btn.disabled=true;}
  renderAll();showToast('AJOUTÉ !','success');
  if(curTab==='playlist-detail')renderPlDetail(pid);
}
function rmFromPl(tid,pid){
  const pl=playlists.find(p=>p.id===pid);if(!pl)return;
  pl.trackIds=pl.trackIds.filter(id=>id!==tid);
  saveP();renderAll();
  if(curTab==='playlist-detail')renderPlDetail(pid);
  showToast('RETIRÉ');
}
function delTrack(id){
  if(!confirm('Supprimer ce son ?'))return;
  if(queue[qIdx]?.id===id){
    aud.pause();playing=false;
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('playerBar').classList.remove('playing');
    document.getElementById('playerBars').style.display='none';
  }
  tracks=tracks.filter(t=>t.id!==id);
  playlists.forEach(pl=>{pl.trackIds=pl.trackIds.filter(x=>x!==id);});
  dbDelete('tracks',id).catch(()=>{});
  dbDelete('audio',id).catch(()=>{});
  saveP();renderAll();showToast('SON SUPPRIMÉ');
}

function buildEmoji(grid,list,onSelect){
  list.forEach(em=>{
    const b=document.createElement('button');
    b.className='em-btn'+(em===selEmoji?' sel':'');
    b.textContent=em; b.dataset.e=em;
    b.onclick=()=>{
      onSelect(em);
      grid.querySelectorAll('.em-btn').forEach(x=>x.classList.toggle('sel',x.dataset.e===em));
    };
    grid.appendChild(b);
  });
}
function buildColor(){
  const r=document.getElementById('colorRow');
  COLORS.forEach(c=>{
    const b=document.createElement('div');
    b.className='col-btn'+(c===selColor?' sel':'');
    b.style.background=c; b.dataset.c=c;
    b.onclick=()=>{selColor=c;document.querySelectorAll('.col-btn').forEach(x=>x.classList.toggle('sel',x.dataset.c===c));};
    r.appendChild(b);
  });
}

/* ══════════════════════════════════════════════════════
   UTILS

function fmt(s){
  if(!s||isNaN(s))return'0:00';
  const m=Math.floor(s/60);
  return m+':'+String(Math.floor(s%60)).padStart(2,'0');
}

/* ── MEDIA SESSION API ── */
function updateMediaSession(t) {
  if (!('mediaSession' in navigator) || !t) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title,
      artist: t.artist || 'BlockBeats',
      album: 'BlockBeats',
      artwork: [
        { src: './icon-192.png', sizes: '192x192', type: 'image/png' },
        { src: './icon-512.png', sizes: '512x512', type: 'image/png' }
      ]
    });
    navigator.mediaSession.setActionHandler('play',  () => { aud.play(); playing=true; setPlayerUI(t,true); });
    navigator.mediaSession.setActionHandler('pause', () => { aud.pause(); playing=false; setPlayerUI(t,false); });
    navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
    navigator.mediaSession.setActionHandler('nexttrack',     () => nextTrack());
    navigator.mediaSession.setActionHandler('seekto', e => { if(e.seekTime!=null) aud.currentTime = e.seekTime; });
  } catch(e) {}
}
function fmtTotal(ts){
  const total=ts.reduce((a,x)=>a+(x.duration||0),0);
  if(total<60) return Math.round(total)+'s';
  const m=Math.floor(total/60);
  return m<60?m+'min':Math.floor(m/60)+'h'+(m%60?m%60+'min':'');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.classList.remove('show');},2400);
}

init();

// ── SERVICE WORKER (PWA) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW enregistré:', reg.scope))
      .catch(err => console.warn('SW erreur:', err));
  });
}

// ── INSTALL PROMPT ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'inline-flex';
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'none';
  showToast('APP INSTALLÉE ! ✓', 'success');
});

function promptInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}
